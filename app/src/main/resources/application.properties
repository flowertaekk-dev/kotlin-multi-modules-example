# app 모듈의 메인 설정 파일. Spring Boot가 시작할 때 가장 먼저 읽는다.
spring.application.name=person-app

# spring.profiles.include = 추가로 활성화할 프로파일 목록.
# "infra" → infra 모듈의 application-infra.properties 를 자동으로 읽어온다.
# 덕분에 DB 설정(H2, JPA 등)이 이 파일에 없어도 infra 모듈에서 가져온다.
spring.profiles.include=infra

# 기본 포트 8080 대신 8081을 사용한다. (hello-spring-api와 포트 충돌 방지)
server.port=8081
