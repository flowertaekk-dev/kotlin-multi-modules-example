# infra 모듈 전용 설정 파일.
# 파일명 규칙: application-{프로파일명}.properties
# app 모듈의 application.properties에서 spring.profiles.include=infra 로 이 파일을 활성화한다.
# 덕분에 DB 설정이 app 모듈이 아닌 infra 모듈에 캡슐화된다.

# H2 인메모리 DB 연결 설정
# mem:persondb = "persondb"라는 이름의 인메모리 DB (애플리케이션 종료 시 데이터 삭제)
# DB_CLOSE_DELAY=-1 = 마지막 커넥션이 닫혀도 DB를 유지 (앱 종료 전까지)
spring.datasource.url=jdbc:h2:mem:persondb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ddl-auto 옵션:
#   create-drop = 앱 시작 시 테이블 생성, 종료 시 삭제 (개발/테스트용)
#   update      = 스키마 변경 사항만 반영 (개발용, 운영엔 비권장)
#   validate    = 스키마가 엔티티와 일치하는지 검증만 (운영용)
#   none        = 아무것도 하지 않음 (운영용, Flyway/Liquibase로 관리할 때)
spring.jpa.hibernate.ddl-auto=create-drop

# true = 실행되는 SQL을 콘솔에 출력 (개발 중 디버깅용. 운영에서는 false로)
spring.jpa.show-sql=true

# H2 웹 콘솔 활성화. 브라우저에서 DB를 직접 조회할 수 있다.
# 접속: http://localhost:8081/h2-console
# JDBC URL: jdbc:h2:mem:persondb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
